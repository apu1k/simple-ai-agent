# Knowledge-engine configuration.
#
# Qdrant has two different roles here:
# 1. router indexes: small vector indexes used to choose which capability/source to ask.
# 2. data collections: normal vector databases containing evidence such as chats,
#    memories, project files, PDFs, or other indexed documents.
#
# Retrieval is local. When synthesis is enabled, retrieved evidence is sent to
# the configured LLM provider before the compact result is returned to the main model.

synthesis:
  enabled: true

  # Empty means: use the currently selected provider and its credentials.
  # Set a providers.toml key here to use a dedicated provider instead.
  provider_key: "openai"
  model: gpt-5.6-luna

  # Preserve knowledge-tool availability if synthesis times out, fails schema
  # validation, or returns an unknown citation ID.
  fallback_to_raw: true

qdrant:
  enabled: true

  # local = embedded/local qdrant-client storage at local_path, no HTTP service.
  # http = connect to a locally running Qdrant server via url.
  # Server mode avoids embedded-storage locks while the Textual app is running.
  mode: http
  local_path: runtime/knowledge/qdrant
  url: http://localhost:6333
  timeout_seconds: 2.0

  # Router index for selecting capability definitions from config/capabilities/*.yaml.
  capability_collection: agent_capability_router

  # Default embedding settings. BGE-M3 is installed locally and used with
  # embedding_local_files_only=true to avoid accidental model downloads.
  # BGE-M3 produces 1024-dimensional vectors and is a good multilingual
  # German/English retrieval model for chats, memories, docs, and capability routing.
  embedding_backend: sentence_transformers
  embedding_model: C:/models/bge-m3
  embedding_device: cpu
  embedding_local_files_only: true
  embedding_batch_size: 16
  vector_size: 1024
  distance: Cosine

  # Ordinary Qdrant data collections. Capabilities may search these after routing.
  data_collections:
    chat_history:
      collection: agent_chat_history
      description: Complete persisted chat history turns and conversation snippets.
      sensitivity: personal
      source_type: chats
    long_term_memory:
      collection: agent_long_term_memory
      description: Explicit durable memory entries saved by the agent.
      sensitivity: personal
      source_type: memory
